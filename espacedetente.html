<!DOCTYPE html>
<html>
<head>
  <title>Game Hub Console</title>

  <style>
    body {
      margin: 0;
      background: #050505;
      color: white;
      font-family: monospace;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 400px;
    }

    .title {
      text-align: center;
      margin-bottom: 20px;
      font-size: 20px;
      letter-spacing: 3px;
      opacity: 0.8;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .item {
      padding: 15px;
      border: 1px solid #222;
      background: #111;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .item:hover {
      background: #1a1a1a;
    }

    .item.selected {
      border: 1px solid #00ffcc;
      box-shadow: 0 0 15px #00ffcc;
      background: #0d0d0d;
      transform: scale(1.03);
    }

    .tag {
      font-size: 12px;
      opacity: 0.5;
    }

    .hint {
      margin-top: 20px;
      text-align: center;
      font-size: 12px;
      opacity: 0.5;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="title">GAME HUB // CONSOLE</div>

  <div class="menu" id="menu">
    <div class="item selected" onclick="openGame('game-balls.html')">
      🎮 Game Balls <span class="tag">PLAY</span>
    </div>

    <div class="item" onclick="openGame('games/game-2.html')">
      🧩 Game 2 <span class="tag">WIP</span>
    </div>

    <div class="item" onclick="openGame('games/game-3.html')">
      🚀 Game 3 <span class="tag">WIP</span>
    </div>
  </div>

  <div class="hint">↑ ↓ to navigate • ENTER to select</div>
</div>

<script>
  const items = document.querySelectorAll(".item");
  let index = 0;

  function updateSelection() {
    items.forEach(i => i.classList.remove("selected"));
    items[index].classList.add("selected");
  }

  function openGame(url) {
    window.location.href = url;
  }

  document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowDown") {
      index = (index + 1) % items.length;
      updateSelection();
    }

    if (e.key === "ArrowUp") {
      index = (index - 1 + items.length) % items.length;
      updateSelection();
    }

    if (e.key === "Enter") {
      items[index].click();
    }
  });
</script>

</body>
</html>
