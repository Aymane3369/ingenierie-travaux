<!DOCTYPE html>
<html>
<head>
  <title>Game Hub Ultra Console</title>

  <style>
    :root {
      --bg1: #05070a;
      --text: #fff;
      --card: rgba(255,255,255,0.06);
      --border: rgba(255,255,255,0.12);
      --glow: #00ffcc;
    }

    body.light {
      --bg1: #eef3ff;
      --text: #111;
      --card: rgba(0,0,0,0.05);
      --border: rgba(0,0,0,0.15);
      --glow: #0077ff;
    }

    body.neon {
      --bg1: #000;
      --text: #fff;
      --card: rgba(255,255,255,0.04);
      --border: #ff00ff;
      --glow: #ff00ff;
    }

    body {
      margin: 0;
      font-family: monospace;
      overflow: hidden;
      color: var(--text);
      background: var(--bg1);
      transition: 0.4s;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* ======================
       🌊 BACKGROUND WAVES
    ====================== */
    .waves {
      position: fixed;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      z-index: 0;
      opacity: 0.6;
    }

    .wave {
      position: absolute;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 30%, rgba(0,255,204,0.25), transparent 60%);
      animation: moveWave 12s linear infinite;
      filter: blur(40px);
    }

    .wave:nth-child(2) {
      animation-duration: 18s;
      opacity: 0.5;
    }

    .wave:nth-child(3) {
      animation-duration: 25s;
      opacity: 0.3;
    }

    @keyframes moveWave {
      0% { transform: translate(-20%, -20%) rotate(0deg); }
      50% { transform: translate(20%, 10%) rotate(180deg); }
      100% { transform: translate(-20%, -20%) rotate(360deg); }
    }

    /* ======================
       ✨ PARTICLES CANVAS
    ====================== */
    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 1;
    }

    /* ======================
       BOOT SCREEN
    ====================== */
    #boot {
      position: fixed;
      inset: 0;
      background: black;
      z-index: 999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    #boot h1 {
      letter-spacing: 8px;
      opacity: 0;
      animation: fadeIn 1.5s forwards;
    }

    .bar {
      width: 220px;
      height: 2px;
      background: #222;
      margin-top: 20px;
      overflow: hidden;
    }

    .bar::after {
      content: "";
      width: 40%;
      height: 100%;
      background: white;
      display: block;
      animation: load 1.2s infinite;
    }

    @keyframes load {
      0% { transform: translateX(-120%); }
      100% { transform: translateX(320%); }
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* ======================
       UI MENU
    ====================== */

    .container {
      position: relative;
      z-index: 2;
      width: 460px;
    }

    .title {
      text-align: center;
      margin-bottom: 20px;
      letter-spacing: 4px;
      opacity: 0.8;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .item {
      padding: 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      transition: 0.15s;
      backdrop-filter: blur(10px);
    }

    .item.selected {
      border: 1px solid var(--glow);
      box-shadow: 0 0 25px var(--glow);
      transform: scale(1.04);
    }

    .hint {
      margin-top: 15px;
      text-align: center;
      font-size: 11px;
      opacity: 0.6;
    }

    /* ===== THEME BUTTON ICON ===== */
    .theme-btn {
      position: absolute;
      top: 15px;
      right: 15px;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--card);
      cursor: pointer;
      z-index: 3;
      font-size: 18px;
    }
  </style>
</head>

<body>

<!-- 🌊 WAVES -->
<div class="waves">
  <div class="wave"></div>
  <div class="wave"></div>
  <div class="wave"></div>
</div>

<!-- ✨ PARTICLES -->
<canvas id="particles"></canvas>

<!-- BOOT -->
<div id="boot">
  <h2>Bienvenue dans votre Espace détente</h2>
  <div class="bar"></div>
</div>

<!-- THEME -->
<button class="theme-btn" onclick="cycleTheme()">☀</button>

<!-- MENU -->
<div class="container">
  <div class="title">GAME HUB // CONSOLE</div>

  <div class="menu">
    <div class="item selected" onclick="go('game-balls.html')">
      🎮 Game Balls <span>▶</span>
    </div>

    <div class="item" onclick="go('game-2.html')">
      🧩 Game 2 <span>WIP</span>
    </div>

    <div class="item" onclick="go('game-3.html')">
      🚀 Game 3 <span>WIP</span>
    </div>
  </div>

  <div class="hint">↑ ↓ navigate • ENTER select</div>
</div>

<script>
/* ======================
   🔊 SOUND ENGINE
====================== */
let audioCtx;

function beep(f, d, t="sine", v=0.05){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type=t; o.frequency.value=f;
  g.gain.value=v;
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime+d);
}

function moveSound(){ beep(420,0.05); }
function selectSound(){ beep(820,0.08,"triangle",0.06); }

/* BOOT SOUND */
setTimeout(()=>beep(200,0.2),200);
setTimeout(()=>beep(350,0.2),500);

/* BOOT REMOVE */
setTimeout(()=>{
  document.getElementById("boot").style.opacity="0";
  setTimeout(()=>document.getElementById("boot").remove(),800);
},2200);

/* ======================
   MENU
====================== */
const items=document.querySelectorAll(".item");
let index=0;

function update(){
  items.forEach(i=>i.classList.remove("selected"));
  items[index].classList.add("selected");
}

function go(url){
  selectSound();
  setTimeout(()=>location.href=url,120);
}

document.addEventListener("keydown",(e)=>{
  if(e.key==="ArrowDown"){
    index=(index+1)%items.length;
    update(); moveSound();
  }
  if(e.key==="ArrowUp"){
    index=(index-1+items.length)%items.length;
    update(); moveSound();
  }
  if(e.key==="Enter") items[index].click();
});

/* ======================
   THEME
====================== */
const themes=["default","light","neon"];
let t=0;

function cycleTheme(){
  document.body.classList.remove("light","neon");
  t=(t+1)%themes.length;
  if(themes[t]==="light") document.body.classList.add("light");
  if(themes[t]==="neon") document.body.classList.add("neon");
  moveSound();
  localStorage.setItem("theme",themes[t]);
}

const saved=localStorage.getItem("theme");
if(saved==="light") document.body.classList.add("light");
if(saved==="neon") document.body.classList.add("neon");

/* ======================
   ✨ PARTICLES SYSTEM
====================== */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

let particles=[];

for(let i=0;i<60;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2+1,
    dx:(Math.random()-0.5)*0.3,
    dy:(Math.random()-0.5)*0.3
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for(let p of particles){
    p.x+=p.dx;
    p.y+=p.dy;

    if(p.x<0||p.x>canvas.width) p.dx*=-1;
    if(p.y<0||p.y>canvas.height) p.dy*=-1;

    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle="rgba(255,255,255,0.5)";
    ctx.fill();
  }

  requestAnimationFrame(animate);
}

animate();

window.addEventListener("resize",()=>{
  canvas.width=innerWidth;
  canvas.height=innerHeight;
});
</script>

</body>
</html>
