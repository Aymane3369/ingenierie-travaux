
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prise de rendez-vous</title>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg,#4f46e5,#06b6d4);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:0;
}

.card {
    background:white;
    padding:25px;
    border-radius:15px;
    width:360px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2 { text-align:center; }

label { display:block; margin-top:10px; font-weight:bold; }

input, select {
    width:100%;
    padding:10px;
    margin-top:5px;
    border-radius:8px;
    border:1px solid #ddd;
}

button {
    width:100%;
    margin-top:15px;
    padding:12px;
    background:#4f46e5;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.msg {
    text-align:center;
    margin-top:10px;
    font-size:13px;
}
</style>
</head>

<body>

<div class="card">
<h2>Prise de RDV</h2>

<input type="text" id="name" placeholder="Nom">
<input type="email" id="email" placeholder="Email">
<input type="text" id="motif" placeholder="Motif / description du RDV">

<label>Date</label>
<input type="date" id="date">

<label>Horaire</label>
<select id="heure">
    <option>Choisir une date</option>
</select>

<button onclick="reserver()">Confirmer RDV</button>

<div class="msg" id="msg"></div>
</div>

<script>
// 🔑 EMAILJS CONFIG
emailjs.init({
  publicKey: "YfECB4XzMq03NfFpz"
});

const SERVICE_ID = "service_ues8f94";
const TEMPLATE_ID = "template_dywry5b";

// horaires 30 min
const horaires = [
"08:00 - 08:30","08:30 - 09:00",
"09:00 - 09:30","09:30 - 10:00",
"10:00 - 10:30","10:30 - 11:00",
"11:00 - 11:30","11:30 - 12:00",
"14:00 - 14:30","14:30 - 15:00",
"15:00 - 15:30","15:30 - 16:00",
"16:00 - 16:30","16:30 - 17:00"
];

// localStorage
function getData(){
return JSON.parse(localStorage.getItem("rdv")) || {};
}

function saveData(data){
localStorage.setItem("rdv", JSON.stringify(data));
}

// génération horaires
document.getElementById("date").addEventListener("change", function(){

const select = document.getElementById("heure");
select.innerHTML = "";

if(!this.value) return;

const d = new Date(this.value + "T00:00:00");
const jour = d.getDay();

// week-end
if(jour === 0 || jour === 6){
select.innerHTML = "<option>Fermé le week-end</option>";
return;
}

const data = getData();
const pris = data[this.value] || [];

let def = document.createElement("option");
def.text = "Choisir un horaire";
def.value = "";
select.appendChild(def);

horaires.forEach(h => {
if(!pris.includes(h)){
let opt = document.createElement("option");
opt.value = h;
opt.text = h;
select.appendChild(opt);
}
});

if(select.options.length === 1){
select.innerHTML = "<option>Aucun créneau disponible</option>";
}
});

// réservation + email
function reserver(){

const name = document.getElementById("name").value;
const email = document.getElementById("email").value;
const date = document.getElementById("date").value;
const heure = document.getElementById("heure").value;
const msg = document.getElementById("msg");

if(!name || !email || !date || !heure){
msg.style.color = "red";
msg.textContent = "Remplis tous les champs";
return;
}

// localStorage
let data = getData();
if(!data[date]) data[date] = [];

if(data[date].includes(heure)){
msg.style.color = "red";
msg.textContent = "Créneau déjà pris";
return;
}

data[date].push(heure);
saveData(data);

// EMAILJS
const adminPromise = emailjs.send("service_ues8f94", "template_974xxji", {
    name,
    email,
    date,
    time: heure,
    motif: document.getElementById("motif").value
});

// client email (on s’en fiche s’il échoue)
const clientPromise = emailjs.send("service_ues8f94", "template_dywry5b", {
    name,
    email,
    date,
    time: heure,
    motif: document.getElementById("motif").value
}).catch(err => {
    console.log("Client email échoué (ignoré)", err);
});

Promise.all([adminPromise, clientPromise])
.then(() => {

    let data = getData();
    data[date].push(heure);
    saveData(data);

    msg.style.color = "green";
    msg.textContent = "RDV confirmé ✔️ (email admin garanti)";

    document.getElementById("date").dispatchEvent(new Event("change"));

})
.catch((err) => {
    console.log("Erreur admin email :", err);
    msg.style.color = "red";
    msg.textContent = "Erreur critique ❌ (RDV non enregistré)";
});

// refresh horaires
document.getElementById("date").dispatchEvent(new Event("change"));
}
</script>

</body>
</html>
